services:
  kali-server:
    container_name: zebbern-kali
    image: ghcr.io/zebbern/zebbern-kali-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INCLUDE_METASPLOIT: "${INCLUDE_METASPLOIT:-true}"
    ports:
      - "${API_PORT:-5000}:${API_PORT:-5000}"
      - "1080:1080"
    environment:
      - API_PORT=${API_PORT:-5000}
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - BLOCKING_TIMEOUT=${BLOCKING_TIMEOUT:-5}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - kali-tmp:/app/tmp
      - ${VPN_DIR:-./vpn}:/vpn:ro
    restart: unless-stopped
    # -- CTF network helpers (uncomment as needed) --
    # dns:
    #   - 8.8.8.8
    #   - 1.1.1.1
    # extra_hosts:
    #   - "ctf.local:10.10.10.1"

volumes:
  kali-tmp:

services:
  kali-server:
    container_name: zebbern-kali
    image: ghcr.io/zebbern/zebbern-kali-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5000}:${API_PORT:-5000}"
      - "1080:1080"
    environment:
      - API_PORT=${API_PORT:-5000}
      - DEBUG_MODE=${DEBUG_MODE:-0}
      - BLOCKING_TIMEOUT=${BLOCKING_TIMEOUT:-30}
      - HTB_ROUTES=${HTB_ROUTES:-}
      - EXTRA_HOSTS=${EXTRA_HOSTS:-}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - kali-tmp:/app/tmp
      - ${VPN_DIR:-./vpn}:/vpn:ro
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      - net.ipv4.ip_forward=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "2.0"
    # -- CTF network helpers (uncomment as needed) --
    # dns:
    #   - 8.8.8.8
    #   - 1.1.1.1
    # extra_hosts:
    #   - "ctf.local:10.10.10.1"

volumes:
  kali-tmp:

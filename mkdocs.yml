site_name: Zebbern-MCP Documentation
site_description: Complete documentation for the Zebbern-MCP Kali Linux penetration testing toolkit
site_author: Zebbern
repo_url: https://github.com/zebbern/zebbern-kali-mcp
repo_name: zebbern/zebbern-kali-mcp

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Docker Setup: docker-install.md
      - VM Setup: vm-install.md
      - Configuration: configuration.md
  - Architecture: architecture.md
  - Reference:
      - MCP Tools: tools-reference.md
      - API Endpoints: api-reference.md
  - Guides:
      - Workflows: workflows.md
      - Security: security.md
      - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zebbern/zebbern-mcp
  generator: false
